name: Build & Release Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: '镜像版本号 (例如: 1.1.9)'
        required: true
        type: string
      latest:
        description: '同时推送到 GHCR 并标记为 latest'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          outputs: type=docker,dest=/tmp/py-xiaozhi-${{ matrix.suffix }}.tar
          tags: py-xiaozhi:${{ matrix.suffix }}

      - name: Compress image
        run: gzip /tmp/py-xiaozhi-${{ matrix.suffix }}.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.suffix }}
          path: /tmp/py-xiaozhi-${{ matrix.suffix }}.tar.gz
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/images
          merge-multiple: true

      - name: Generate checksums
        working-directory: /tmp/images
        run: |
          sha256sum py-xiaozhi-*.tar.gz > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: docker-v${{ inputs.version }}
          name: "Docker v${{ inputs.version }}"
          body: |
            ## Docker 镜像 v${{ inputs.version }}

            ### 包含文件
            | 文件 | 架构 |
            |------|------|
            | `py-xiaozhi-amd64.tar.gz` | x86_64 (Intel/AMD) |
            | `py-xiaozhi-arm64.tar.gz` | ARM64 (Apple Silicon / Raspberry Pi 等) |

            ### 使用方式
            ```bash
            # 下载对应架构的镜像包后加载
            gunzip py-xiaozhi-amd64.tar.gz
            docker load -i py-xiaozhi-amd64.tar

            # 运行
            docker run -it --rm \
              -v ./config:/app/config \
              -v ./models:/app/models \
              --device /dev/snd \
              py-xiaozhi:amd64
            ```
          files: |
            /tmp/images/py-xiaozhi-amd64.tar.gz
            /tmp/images/py-xiaozhi-arm64.tar.gz
            /tmp/images/checksums-sha256.txt
          draft: false
          prerelease: false

  push-registry:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ inputs.latest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ inputs.version }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
